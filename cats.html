  <script>
    const menuBtn = document.getElementById('menuBtn');
    const overlay = document.getElementById('menuOverlay');
    const clickArea = document.getElementById('overlayClickArea');
    const panel = document.getElementById('menuPanel');

    function positionPanel() {
      const r = menuBtn.getBoundingClientRect();
      const gap = 8;
      panel.style.top = '-1000px';
      panel.style.left = '-1000px';
      const w = panel.offsetWidth;
      let left = r.right - w;
      left = Math.max(8, Math.min(left, window.innerWidth - w - 8));
      panel.style.top = (r.bottom + gap) + 'px';
      panel.style.left = left + 'px';
    }
    function openMenu() {
      overlay.classList.remove('hidden');
      positionPanel();
      requestAnimationFrame(() => {
        panel.classList.remove('opacity-0', 'scale-y-0');
        panel.classList.add('scale-y-100');
      });
      document.addEventListener('keydown', onEsc);
      menuBtn.setAttribute('aria-expanded', 'true');
      const firstItem = panel.querySelector('[role="menuitem"]');
      if (firstItem) firstItem.focus();
    }
    function closeMenu() {
      panel.classList.add('opacity-0');
      panel.classList.remove('scale-y-100');
      panel.classList.add('scale-y-0');
      menuBtn.setAttribute('aria-expanded', 'false');
      document.removeEventListener('keydown', onEsc);
      setTimeout(() => overlay.classList.add('hidden'), 150);
      menuBtn.focus();
    }
    function onEsc(e) { if (e.key === 'Escape') closeMenu(); }

    menuBtn.addEventListener('click', () => {
      const expanded = menuBtn.getAttribute('aria-expanded') === 'true';
      expanded ? closeMenu() : openMenu();
    });
    clickArea.addEventListener('click', (e) => {
      if (!panel.contains(e.target) && e.target !== menuBtn) closeMenu();
    });
    panel.addEventListener('keydown', (e) => {
      const items = Array.from(panel.querySelectorAll('[role="menuitem"]'));
      const i = items.indexOf(document.activeElement);
      if (e.key === 'ArrowDown') { e.preventDefault(); items[(i + 1 + items.length) % items.length].focus(); }
      if (e.key === 'ArrowUp') { e.preventDefault(); items[(i - 1 + items.length) % items.length].focus(); }
      if (e.key === 'Home') { e.preventDefault(); items[0].focus(); }
      if (e.key === 'End') { e.preventDefault(); items[items.length - 1].focus(); }
    });
    window.addEventListener('resize', () => {
      if (!overlay.classList.contains('hidden')) positionPanel();
    });
    // 點任何選單項目後就關閉（避免停留）
    panel.querySelectorAll('[role="menuitem"]').forEach(el => {
      el.addEventListener('click', () => { try { closeMenu(); } catch (_) { } });
    });
  </script>

  <script src="./assets/firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import {
      getFirestore, collection, getDocs, query, orderBy, where,
      doc, getDoc, addDoc, updateDoc, deleteDoc, serverTimestamp, limit as fbLimit,
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getStorage, ref as sRef, uploadBytes, uploadBytesResumable, getDownloadURL, deleteObject, listAll, } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      setPersistence,
      indexedDBLocalPersistence,
      browserLocalPersistence,
      browserSessionPersistence,
      inMemoryPersistence,
      signOut,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    // Firebase Hosting on web.app/custom domain + Safari/Firefox 的 storage partitioning：
    // authDomain 盡量用「目前正在服務的網域」，redirect 會比較穩。
    const __cfg = (window.firebaseConfig ? { ...window.firebaseConfig } : {});
    try {
      const host = window.location.hostname;
      const isLocal =
        host === "localhost" || host === "127.0.0.1" || host === "::1" || host === "";
      if (!isLocal && host) __cfg.authDomain = host;
    } catch (_) { }
    const app = initializeApp(__cfg);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // 讓 dialog（petDialog.fixed.js / shared.js）能在「非 module」腳本中使用 Firebase 與狀態
    Object.assign(window, {
      db, storage,
      collection, getDocs, query, orderBy, where,
      doc, getDoc, updateDoc, deleteDoc, serverTimestamp, fbLimit,
      sRef, uploadBytes, uploadBytesResumable, getDownloadURL, deleteObject, listAll,
    });

    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ===============================
    // Google 登入白名單（後台/編輯權限）
    // ===============================
    // ✅ 只允許白名單帳號成為「小編」
    //    - 先用 emails 精準控管；或改用 domains 允許整個網域
    //    - 若兩個清單都留空：維持原本行為（任何帳號登入都算「小編」）
    const __WL_EMAILS = new Set([
      // "tonyj0721@gmail.com",
      // "cookiech0926@gmail.com",
      // "ccc@gmail.com",
      // "ddd@gmail.com",
      // "eee@gmail.com",
      // "fff@gmail.com",
    ]);
    const __WL_DOMAINS = new Set([
      // "your-org.com",
    ]);

    const __wlNorm = (s) => (s || "").trim().toLowerCase();
    const __wlEnabled = () => (__WL_EMAILS.size > 0 || __WL_DOMAINS.size > 0);
    const __wlAllowed = (user) => {
      if (!__wlEnabled()) return true; // 沒設定白名單時，維持原本行為
      const email = __wlNorm(user?.email);
      if (!email) return false;
      if (__WL_EMAILS.has(email)) return true;
      const domain = email.split("@")[1];
      if (domain && __WL_DOMAINS.has(domain)) return true;
      return false;
    };

    const LoginBtn = document.getElementById("GoogleLogin");

    async function ensurePersistence() {
      try { await setPersistence(auth, indexedDBLocalPersistence); return; } catch (_) { }
      try { await setPersistence(auth, browserLocalPersistence); return; } catch (_) { }
      try { await setPersistence(auth, browserSessionPersistence); return; } catch (_) { }
      try { await setPersistence(auth, inMemoryPersistence); } catch (_) { }
    }

    // 先設定持久化、再接回 redirect 結果（不輸出任何提示）
    (async () => {
      try { await ensurePersistence(); } catch (_) { }
      try { await getRedirectResult(auth); } catch (_) { }
    })();

    async function startGoogleLogin() {
      if (auth.currentUser) return; // 已登入就不重複登入
      try { await ensurePersistence(); } catch (_) { }
      try { sessionStorage.setItem("__pendingGoogleLogin", "1"); } catch (_) { }
      try { await signInWithRedirect(auth, provider); } catch (_) { }
    }

    // 狗掌：單點回 index.html；長按 >= 650ms 觸發登入（不用放開）
    if (LoginBtn) {
      const LONG_PRESS_MS = 650;
      let pressTimer = null;
      let suppressNextClick = false;

      const clearTimer = () => {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      };

      const onDown = (e) => {
        suppressNextClick = false;
        clearTimer();
        pressTimer = setTimeout(() => {
          suppressNextClick = true;
          clearTimer();
          startGoogleLogin();
        }, LONG_PRESS_MS);
      };

      const onUp = () => { clearTimer(); };
      const onCancel = () => { clearTimer(); };

      if ("PointerEvent" in window) {
        LoginBtn.addEventListener("pointerdown", onDown, { passive: false });
        LoginBtn.addEventListener("pointerup", onUp, { passive: true });
        LoginBtn.addEventListener("pointercancel", onCancel, { passive: true });
        LoginBtn.addEventListener("pointerleave", onCancel, { passive: true });
      } else {
        LoginBtn.addEventListener("touchstart", onDown, { passive: false });
        LoginBtn.addEventListener("touchend", onUp, { passive: true });
        LoginBtn.addEventListener("touchcancel", onCancel, { passive: true });
      }

      LoginBtn.addEventListener("click", (e) => {
        if (suppressNextClick) {
          try { e.preventDefault(); } catch (_) { }
          try { e.stopPropagation(); } catch (_) { }
          suppressNextClick = false;
          return;
        }
        window.location.href = "index.html";
      });

      // 避免 iOS 長按跳出選單（拷貝/開新頁）
      LoginBtn.addEventListener("contextmenu", (e) => { try { e.preventDefault(); } catch (_) { } });
    }

    const adminLabel = document.getElementById("adminLabel");
    const adminLinks = document.querySelectorAll(".nav-admin-link");
    const logoutBtns = document.querySelectorAll(".nav-logout-btn");
    // ⬇ 新增：modal 裡兩組按鈕
    const guestActionBar = document.getElementById("guestActionBar");
    const adminActionBar = document.getElementById("actionBar");

    // 依登入狀態更新 header / 導覽
    let __wlSigningOut = false;
    onAuthStateChanged(auth, async (user) => {
      const rawLogin = !!user;
      const isLogin = rawLogin && __wlAllowed(user);
      window.__isLogin = isLogin;  // ← 加這行
      window.__isAdmin = isLogin;

      try { if (rawLogin) sessionStorage.removeItem("__pendingGoogleLogin"); } catch (_) { }

      // 有登入但不在白名單自動登出
      if (rawLogin && !isLogin && !__wlSigningOut) {
        __wlSigningOut = true;
        try { await signOut(auth); } catch (e) { console.error("signOut failed", e); }
        __wlSigningOut = false;
      }

      adminLabel?.classList.toggle("hidden", !isLogin);

      adminLinks.forEach((el) => {
        el.classList.toggle("hidden", !isLogin);
      });

      logoutBtns.forEach((el) => {
        el.classList.toggle("hidden", !isLogin);
      });

      // modal：訪客（我要認養/分享） vs 管理員（編輯/已送養/刪除）
      if (guestActionBar) {
        // class 保險，順便用 display 強制
        guestActionBar.classList.toggle("hidden", isLogin);
        guestActionBar.style.removeProperty("display"); // 保險：清掉舊的 inline display
      }

      if (adminActionBar) {
        adminActionBar.classList.toggle("hidden", !isLogin);
        adminActionBar.style.removeProperty("display"); // 保險
      }

      // 登出：強制收掉編輯狀態，且不要再 setEditMode（避免把 actionBar 又打開）
      if (!isLogin) {
        document.getElementById("editArea")?.classList.add("hidden");
        document.getElementById("editActionBar")?.classList.add("hidden");
        document.getElementById("adoptedUpload")?.classList.add("hidden");
        return;
      }

      // 只有登入時，才同步一次目前是否在 edit mode
      const inEdit = !document.getElementById("editArea")?.classList.contains("hidden");
      if (typeof window.setEditMode === "function") window.setEditMode(inEdit); // ← 加這行
    });

    // 桌機 + 手機「登出」按鈕
    logoutBtns.forEach((btn) => {
      btn.addEventListener("click", async (e) => {
        e.preventDefault();
        try {
          await signOut(auth);

          // 如果手機選單有開，把它關掉
          const overlay = document.getElementById("menuOverlay");
          if (overlay) overlay.classList.add("hidden");
        } catch (err) {
          console.error("登出失敗", err);
          alert("登出失敗，請稍後再試。");
        }
      });
    });

    const SPECIES = "貓";
    const pets = (window.pets ||= []);
    let currentPetId = null;

    // ===== Pagination (1頁10隻) =====
    const PAGE_SIZE = 10;
    let currentPage = 1;
    let viewList = [];

    const $ = (q) => document.querySelector(q);
    const $$ = (q) => document.querySelectorAll(q);
    // ===== Video thumbnail helpers (backend thumbs + play badge) =====
    const __THUMB_PLAY_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>';

    function isVideoUrl(url) {
      if (!url) return false;
      const u = String(url).split("?", 1)[0];
      return /\.(mp4|webm|ogg|mov|m4v)$/i.test(u);
    }

    // downloadUrl → Storage path（用於 thumbByPath）
    function storagePathFromDownloadUrl(url) {
      try {
        const p = String(url || "").split("/o/")[1].split("?")[0];
        return decodeURIComponent(p);
      } catch (_) {
        return "";
      }
    }

    // 影片縮圖（後端縮圖還沒產出時的備援）：seek 到前面一點顯示第一幀
    function __primeThumbVideoFrame(v) {
      if (!v || v.dataset.__primed === "1") return;
      v.dataset.__primed = "1";

      const onMeta = () => {
        try {
          const dur = Number.isFinite(v.duration) ? v.duration : 0;
          let t = 0.05;
          if (dur && dur > 0.2) {
            t = Math.min(0.2, dur / 2);
            t = Math.max(0.05, Math.min(t, dur - 0.05));
          }
          v.currentTime = t;
        } catch (_) { }
      };

      const onSeeked = () => { try { v.pause(); } catch (_) { } };
      v.addEventListener("loadedmetadata", onMeta, { once: true });
      v.addEventListener("seeked", onSeeked, { once: true });

      setTimeout(() => {
        try {
          if (v.readyState < 2) return;
          if (v.currentTime === 0) v.currentTime = 0.05;
        } catch (_) { }
      }, 120);
    }


    const BREED_DICT = {
      "品種貓": [
        "美國短毛貓", "英國短毛貓", "藍貓", "暹羅貓", "波斯貓", "布偶貓", "緬因貓", "曼赤肯", "金漸層曼赤肯", "小步舞曲貓"
      ],
      "米克斯": [
        "橘貓", "橘白貓", "黑貓", "賓士貓", "虎斑貓", "白底虎斑貓", "三花貓", "玳瑁貓", "白貓"
      ]
    };

    function ageBucket(ageStr) {
      if (!ageStr) return "";
      const raw = String(ageStr);
      const s = raw.replace(/\s+/g, ""); // 去空白，方便比對

      // ✅ 明確定義「不到 1 歲」：不到/未滿/小於/低於/< + 1(或一) + 歲
      //    並排除「不到1歲半 / 不到1歲多」這種可能 >= 1 的寫法
      if (/(?:不到|未滿|小於|低於|<)(?:1)歲/.test(s)) {
        return "1以下";
      }

      // 若寫「X月」或數值 < 1，皆歸「1以下」
      const numMatch = s.match(/(\d+(?:\.\d+)?)/);
      const years = numMatch ? parseFloat(numMatch[1]) : null;

      if (s.includes("月") || (years !== null && years < 1)) return "1以下";

      if (years !== null) {
        if (years <= 5) return "1-5";   // 1~5 歲
        if (years <= 10) return "6-10"; // 6~10 歲
        return "10以上";
      }

      // 文字關鍵字後援
      if (s.includes("幼")) return "1以下";
      if (s.includes("成")) return "1-5";
      if (s.includes("熟")) return "6-10";
      return "";
    }

    function makePetUrl(id) {
      return `${location.origin}${location.pathname}?pet=${encodeURIComponent(id)}`;
    }

    function openFromDeepLink() {
      const q = new URLSearchParams(location.search);
      const id = q.get('pet');
      if (!id || !Array.isArray(pets)) return;
      const hit = pets.find(p => p.id === id);
      if (hit) openDialog(hit.id);
    }

    function render(list) {
      const grid = $('#grid');
      grid.innerHTML = '';
      if (!list.length) {
        $('#emptyState').classList.remove('hidden');
        const pw = $('#pagerWrap');
        if (pw) pw.classList.add('hidden');
        return;
      }
      $('#emptyState').classList.add('hidden');

      viewList = list;
      const totalItems = list.length;
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageList = list.slice(start, start + PAGE_SIZE);

      const pagerWrap = $('#pagerWrap');
      if (pagerWrap) pagerWrap.classList.remove('hidden');

      pageList.forEach(p => {
        const card = document.createElement('article');
        card.className = 'group rounded-2xl overflow-hidden ring-1 ring-gray-200 bg-white hover:shadow-soft transition-shadow';

        // 取封面圖（先用 p.images[0]，沒有的話退回 p.image）
        const imgs = Array.isArray(p.images) && p.images.length ? p.images : (p.image ? [p.image] : []);
        const img = imgs[0] || '';

        const mediaUrl = img;
        const isVid = isVideoUrl(mediaUrl);
        const videoPath = isVid ? storagePathFromDownloadUrl(mediaUrl) : "";
        const videoThumb = (isVid && p.thumbByPath && videoPath) ? (p.thumbByPath[videoPath] || "") : "";

        const coverHTML = isVid
          ? (videoThumb
            ? `
              <div class="blur-fit rounded-t-2xl aspect-[4/3]" style="--bg: url('${videoThumb}')">
                <img src="${videoThumb}" alt="${p.name}">
                <div class="video-badge"><div class="video-badge-inner">${__THUMB_PLAY_SVG}</div></div>
              </div>
            `
            : `
              <div class="relative rounded-t-2xl aspect-[4/3] overflow-hidden bg-gray-100">
                <video class="thumb-video w-full h-full object-cover" preload="metadata" muted playsinline webkit-playsinline disablepictureinpicture src="${mediaUrl}"></video>
                <div class="video-badge"><div class="video-badge-inner">${__THUMB_PLAY_SVG}</div></div>
              </div>
            `)
          : `
              <div class="blur-fit rounded-t-2xl aspect-[4/3]" style="--bg: url('${mediaUrl}')">
                <img src="${mediaUrl}" alt="${p.name}">
              </div>
            `;

        card.innerHTML = `
          ${coverHTML}
          <div class="p-4 flex-1 flex flex-col">
            <!-- 第一行：左邊名字、右上角圓角標籤 -->
            <div class="flex items-start justify-between gap-2">
              <h3 class="font-semibold text-lg leading-snug line-clamp-1">${p.name}</h3>
              <span class="shrink-0 rounded-full text-xs px-2 py-1
                ${/(狗|犬)/.test(String(p.species || '')) ? 'bg-sky-50 text-sky-700' : 'bg-emerald-50 text-emerald-700'}">
                ${/(狗|犬)/.test(String(p.species || '')) ? '狗狗' : '貓咪'}
              </span>
            </div>

            <!-- 明細三行 -->
            <div class="mt-2 mb-3 flex flex-col gap-2 text-xs">
              <span class="self-start inline-flex items-center rounded-full bg-gray-100 text-gray-700 px-2.5 py-1 whitespace-nowrap max-w-full truncate">
                ${p.breed}
              </span>
              <span class="self-start inline-flex items-center rounded-full bg-gray-100 text-gray-700 px-2.5 py-1 whitespace-nowrap max-w-full truncate">
                ${p.age}
              </span>
              <span class="self-start inline-flex items-center rounded-full bg-gray-100 text-gray-700 px-2.5 py-1 whitespace-nowrap max-w-full truncate">
                ${p.gender}
              </span>
            </div>

            <!-- 按鈕貼底 -->
            <button class="mt-auto w-full px-3 py-2 rounded-xl bg-gray-900 text-white hover:bg-black btn-detail"
                    data-id="${p.id}">
              查看
            </button>
          </div>
        `;

        grid.appendChild(card);
      });

      grid.querySelectorAll("video.thumb-video").forEach((v) => __primeThumbVideoFrame(v));

      // 綁定「查看」按鈕
      $$('.btn-detail').forEach(btn =>
        btn.addEventListener('click', (e) => openDialog(e.currentTarget.dataset.id))
      );

      updatePager();
    }

    function updatePager() {
      const wrap = $('#pagerWrap');
      const info = $('#pageInfo');
      const pager = $('#pager');
      if (!wrap || !info || !pager) return;

      const totalItems = viewList.length;
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));

      if (totalItems === 0) {
        wrap.classList.add('hidden');
        return;
      }
      wrap.classList.remove('hidden');

      info.textContent = `第 ${currentPage}/${totalPages} 頁（共 ${totalItems} 隻）`;

      pager.innerHTML = '';

      const makeBtn = (label, targetPage, disabled = false, active = false) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'pager-btn' + (active ? ' active' : '');
        b.textContent = label;
        b.disabled = disabled;
        if (!disabled) {
          b.addEventListener('click', () => {
            currentPage = targetPage;
            render(viewList);
            document.getElementById('listSection')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        }
        return b;
      };

      pager.appendChild(makeBtn('«', 1, currentPage === 1));
      pager.appendChild(makeBtn('‹', Math.max(1, currentPage - 1), currentPage === 1));

      const maxNums = 5;
      let start = Math.max(1, currentPage - Math.floor(maxNums / 2));
      let end = Math.min(totalPages, start + maxNums - 1);
      start = Math.max(1, end - maxNums + 1);

      for (let p = start; p <= end; p++) {
        pager.appendChild(makeBtn(String(p), p, false, p === currentPage));
      }

      pager.appendChild(makeBtn('›', Math.min(totalPages, currentPage + 1), currentPage === totalPages));
      pager.appendChild(makeBtn('»', totalPages, currentPage === totalPages));
    }

    function buildBreedOptionsByType() {
      const breedSel = document.getElementById('fBreed');
      const type = document.getElementById('fBreedType').value; // "", "品種貓", "米克斯"

      if (!type) {
        // 未選：右側停用、顯示提示
        breedSel.disabled = true;
        breedSel.innerHTML = '<option value="">請先選擇「品種」</option>';
        return;
      }

      // 已選：右側啟用；依左邊類型決定文案與清單
      const label = (type === '米克斯') ? '不限毛色' : '不限品種';
      const options = (BREED_DICT[type] || []);

      breedSel.disabled = false;
      breedSel.innerHTML =
        `<option value="">${label}</option>` +
        options.map(b => `<option value="${type === '米克斯' ? `米克斯/${b}` : b}">${b}</option>`).join('');
    }

    function getFilters() {
      return {
        breedType: $('#fBreedType').value,
        breed: $('#fBreed').value,
        age: $('#fAge').value,
        gender: $('#fGender').value
      };
    }

    function applyFilters() {
      const f = getFilters();
      const list = pets.filter(p => {
        if (f.breedType && p.breedType !== f.breedType) return false;
        if (f.breed && p.breed !== f.breed) return false;

        if (f.age) {
          const bucket = ageBucket(p.age);
          if (bucket !== f.age) return false;
        }

        if (f.gender && p.gender !== f.gender) return false;

        return true;
      });

      currentPage = 1;
      render(list);
    }

    async function loadPets() {
      const qRef = query(collection(db, "pets"), where("status", "==", "available"), orderBy("createdAt", "desc"));
      const snap = await getDocs(qRef);
      const all = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p && p.mediaReady !== false);
      pets.length = 0;
      pets.push(...all.filter(p => p.species === SPECIES));
      buildBreedOptionsByType(); // ← 新的
      render(pets);
      openFromDeepLink();

      // 即時篩選：任一選單變更就篩
      $('#fBreedType').addEventListener('change', () => {
        buildBreedOptionsByType(); // 先重建子選項
        $('#fBreed').value = '';   // 切換類型時清空子選擇
        applyFilters();
      });

      $('#fBreed').addEventListener('change', applyFilters);
      $('#fAge').addEventListener('change', applyFilters);
      $('#fGender').addEventListener('change', applyFilters);
    }

    $('#dlgShare').addEventListener('click', () => {
      const petId = window.currentPetId;   // ✅ 用全域
      if (!petId) return;
      const name = document.getElementById('dlgName').textContent.trim();
      const url = makePetUrl(petId);
      const msg = `一起幫『 ${name} 』找到家！\n${url}`;

      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

      const shareUrl = isMobile
        ? `https://line.me/R/share?text=${encodeURIComponent(msg)}`
        : `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(`一起幫 ${name} 找到家！`)}`;

      window.open(shareUrl, '_blank', 'noopener,noreferrer');
    });

    document.getElementById('dlgAdopt').onclick = () => {
      const dlg = document.getElementById('petDialog');   // 目標 dialog
      const name = document.getElementById('dlgName').textContent.trim();
      const petId = (window.currentPetId || (typeof p !== 'undefined' && p.id) || '');
      const goto = `adopt.html?pet=${encodeURIComponent(petId)}&name=${encodeURIComponent(name)}`;

      // ① 先顯示「認養條件與流程」(確認/取消)
      const precheckHTML = `
      <div style="text-align:left;max-height:55vh;overflow:auto;padding:4px 2px;">
        <div style="font-weight:800;margin-bottom:24px;text-align:center;font-size:24px;">認養條件與流程</div>
        <ol style="line-height:1.7;padding-left:1.5rem;margin:0; list-style: decimal;">
          <li>需年滿 20 歲，有穩定收入。</li>
          <li>需先了解認養人住家環境、是否有原養寵物。</li>
          <li>確認符合條件，小編篩選後，預約園區參訪。</li>
          <li>確認領養需準備身份證影印本及印章，並簽署認養同意書。</li>
          <li>需負擔結紮等相關費用。</li>
          <li>認養人需長期主動更新毛孩近況，並接受不定期居家訪視。</li>
        </ol>
      </div>
    `;

      Swal.fire({
        target: dlg,
        backdrop: true,
        html: precheckHTML,
        showCancelButton: true,
        confirmButtonText: '我符合，繼續',
        cancelButtonText: '取消',
      }).then(r => {
        if (!r.isConfirmed) return;

        Swal.fire({
          target: dlg,          // 關鍵：把彈窗掛在 dialog 內
          backdrop: false,      // 避免雙遮罩（dialog 已有 backdrop）
          html: `
          <div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0">
            <div style="font-size:48px;line-height:1">💡</div>
            <div style="text-align:center;color:#374151">
              填寫完表單後，按下<br>
              <strong>「📋 複製表單並聯絡小編」</strong><br><br>
              系統會自動複製填寫訊息<br>並開啟 Messenger貼上
            </div>
          </div>
        `,
          confirmButtonText: '繼續',
          showCloseButton: true,
          buttonsStyling: false,
          customClass: { popup: 'rounded-2xl', confirmButton: 'swal2-confirm-btn' }
        }).then(r2 => {
          if (r2.isConfirmed) window.location.href = goto;
        });
      });
    };

    window.loadPets = loadPets;
    loadPets();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/Modal.js"></script>
  <script src="assets/Lightbox.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        const reg = await navigator.serviceWorker.register("./sw.js");

        // 每次載入可檢查更新（不會自動刷新）
        reg.update(); // 你原本就有 :contentReference[oaicite:7]{index=7}

        // 只在「真的有更新」時才提示
        let updatePromptShown = false;

        async function promptUpdate() {
          if (updatePromptShown) return;
          updatePromptShown = true;

          const result = await Swal.fire({
            title: "有新版本可用",
            text: "是否現在更新？（會重新整理頁面）",
            icon: "info",
            showCancelButton: true,
            confirmButtonText: "更新",
            cancelButtonText: "稍後",
          });

          if (result.isConfirmed) {
            // 叫 waiting 的新版 SW 立刻上線
            if (reg.waiting) {
              reg.waiting.postMessage({ type: "SKIP_WAITING" });
            }
          }
        }

        // 若已經有 waiting（例如使用者開著頁面很久後，SW 下載好了）
        if (reg.waiting && navigator.serviceWorker.controller) {
          // controller 存在表示不是第一次安裝，而是「更新」
          promptUpdate();
        }

        // 偵測到新 SW 安裝完成時
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          if (!nw) return;

          nw.addEventListener("statechange", () => {
            // installed + 有 controller => 代表「更新」（不是第一次安裝）
            if (nw.state === "installed" && navigator.serviceWorker.controller) {
              promptUpdate();
            }
          });
        });

        // ✅ 只有在使用者按了「更新」導致 skipWaiting 生效後，才刷新一次
        let reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        });
      });
    }
  </script>
