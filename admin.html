  <script>
    const menuBtn = document.getElementById('menuBtn');
    const overlay = document.getElementById('menuOverlay');
    const clickArea = document.getElementById('overlayClickArea');
    const panel = document.getElementById('menuPanel');

    function positionPanel() {
      const r = menuBtn.getBoundingClientRect();
      const gap = 8;
      panel.style.top = '-1000px';
      panel.style.left = '-1000px';
      const w = panel.offsetWidth;
      let left = r.right - w;
      left = Math.max(8, Math.min(left, window.innerWidth - w - 8));
      panel.style.top = (r.bottom + gap) + 'px';
      panel.style.left = left + 'px';
    }
    function openMenu() {
      overlay.classList.remove('hidden');
      positionPanel();
      requestAnimationFrame(() => {
        panel.classList.remove('opacity-0', 'scale-y-0');
        panel.classList.add('scale-y-100');
      });
      document.addEventListener('keydown', onEsc);
      menuBtn.setAttribute('aria-expanded', 'true');
      const firstItem = panel.querySelector('[role="menuitem"]');
      if (firstItem) firstItem.focus();
    }
    function closeMenu() {
      panel.classList.add('opacity-0');
      panel.classList.remove('scale-y-100');
      panel.classList.add('scale-y-0');
      menuBtn.setAttribute('aria-expanded', 'false');
      document.removeEventListener('keydown', onEsc);
      setTimeout(() => overlay.classList.add('hidden'), 150);
      menuBtn.focus();
    }
    function onEsc(e) { if (e.key === 'Escape') closeMenu(); }

    menuBtn.addEventListener('click', () => {
      const expanded = menuBtn.getAttribute('aria-expanded') === 'true';
      expanded ? closeMenu() : openMenu();
    });
    clickArea.addEventListener('click', (e) => {
      if (!panel.contains(e.target) && e.target !== menuBtn) closeMenu();
    });
    panel.addEventListener('keydown', (e) => {
      const items = Array.from(panel.querySelectorAll('[role="menuitem"]'));
      const i = items.indexOf(document.activeElement);
      if (e.key === 'ArrowDown') { e.preventDefault(); items[(i + 1 + items.length) % items.length].focus(); }
      if (e.key === 'ArrowUp') { e.preventDefault(); items[(i - 1 + items.length) % items.length].focus(); }
      if (e.key === 'Home') { e.preventDefault(); items[0].focus(); }
      if (e.key === 'End') { e.preventDefault(); items[items.length - 1].focus(); }
    });
    window.addEventListener('resize', () => {
      if (!overlay.classList.contains('hidden')) positionPanel();
    });
    // 點任何選單項目後就關閉（避免停留）
    panel.querySelectorAll('[role="menuitem"]').forEach(el => {
      el.addEventListener('click', () => { try { closeMenu(); } catch (_) { } });
    });
  </script>

    // ===============================

    import {

    const app = initializeApp(window.firebaseConfig);
    const db = getFirestore(app);

    // 讓 dialog（petDialog.fixed.js / shared.js）能在「非 module」腳本中使用 Firebase 與狀態
    Object.assign(window, {
      db, storage,
      collection, getDocs, query, orderBy, where,
      doc, getDoc, updateDoc, deleteDoc, serverTimestamp, fbLimit,
      deleteField,
      sRef, uploadBytes, uploadBytesResumable, getDownloadURL, deleteObject, listAll,
    });

    const auth = getAuth(app);

    // ===============================
    // Google 登入白名單（後台/編輯權限）
    // ===============================
    // ✅ 只允許白名單帳號成為「小編」
    //    - 先用 emails 精準控管；或改用 domains 允許整個網域
    //    - 若兩個清單都留空：維持原本行為（任何帳號登入都算「小編」）
    const __WL_EMAILS = new Set([
      // "tonyj0721@gmail.com",
      // "cookiech0926@gmail.com",
      // "ccc@gmail.com",
      // "ddd@gmail.com",
      // "eee@gmail.com",
      // "fff@gmail.com",
    ]);
    const __WL_DOMAINS = new Set([
      // "your-org.com",
    ]);

    const __wlNorm = (s) => (s || "").trim().toLowerCase();
    const __wlEnabled = () => (__WL_EMAILS.size > 0 || __WL_DOMAINS.size > 0);
    const __wlAllowed = (user) => {
      if (!__wlEnabled()) return true; // 沒設定白名單時，維持原本行為
      const email = __wlNorm(user?.email);
      if (!email) return false;
      if (__WL_EMAILS.has(email)) return true;
      const domain = email.split("@")[1];
      if (domain && __WL_DOMAINS.has(domain)) return true;
      return false;
    };

    const logoutBtns = document.querySelectorAll(".nav-logout-btn");

    // ✅ 只有登入者才能進這頁
    let __wlSigningOut = false;
    onAuthStateChanged(auth, async (user) => {
      const rawLogin = !!user;
      const isLogin = rawLogin && __wlAllowed(user);
      window.__isLogin = isLogin;  // ← 加這行
      window.__isAdmin = isLogin;

      // 沒登入就踢回首頁
      if (!rawLogin) { window.location.replace("index.html"); return; }

      // 有登入但不在白名單：踢回首頁
      if (!isLogin && !__wlSigningOut) {
        __wlSigningOut = true;
        try { await signOut(auth); } catch (e) { console.error("signOut failed", e); }
        finally { __wlSigningOut = false; }
        window.location.replace("index.html");
        return;
      }

      // 登出按鈕：有登入才顯示
      logoutBtns.forEach((el) => {
        el.classList.toggle("hidden", !isLogin);
      });
    });

    // ✅ 桌機＋手機「登出」
    logoutBtns.forEach((btn) => {
      btn.addEventListener("click", async (e) => {
        e.preventDefault();
        try {
          await signOut(auth);
          // 登出後也導回首頁
          window.location.replace("index.html");
        } catch (err) {
          console.error("登出失敗", err);
          alert("登出失敗，請稍後再試。");
        }
      });
    });

    // 全域狀態
    const pets = (window.pets ||= []);            // 目前載入的動物列表（最多 15 筆）
    window.pets = pets;
    let currentPetId = null;  // 目前在 Dialog 中的動物 id（編輯/領養用）

    // 小工具：選擇器
    const $ = (q) => document.querySelector(q);

    const speciesInputs = document.querySelectorAll('input[name="species"]');
    const breedTypeSel = $("#breedType");
    const breedSel = $("#breed");
    const breedLabel = $("#breedLabel");

    // 讀取目前勾選的物種
    const getSpecies = () =>
      Array.from(speciesInputs).find((i) => i.checked)?.value || "貓";

    // 依「品種類型」調整右側標籤文字
    const updateBreedLabel = () => {
      const t = breedTypeSel.value;
      breedLabel.textContent = !t ? "品種/毛色" : t === "米克斯" ? "毛色" : "品種";
    };

    // 重置右側下拉
    const resetBreedRight = () => {
      breedSel.disabled = true;
      breedSel.innerHTML = '<option value="">請先選擇品種</option>';
    };

    // 左側「品種類型」與右側「品種/毛色」同步
    function syncBreedSelectors() {
      const isCat = getSpecies() === "貓";
      breedTypeSel.innerHTML = isCat
        ? '<option value="">請選擇</option><option value="品種貓">品種貓</option><option value="米克斯">米克斯</option>'
        : '<option value="">請選擇</option><option value="品種犬">品種犬</option><option value="米克斯">米克斯</option>';
      resetBreedRight();
      updateBreedLabel();
    }

    // 依左側選擇，建立右側選項
    function buildBreedOptions() {
      const list = (BREEDS[getSpecies()] || {})[breedTypeSel.value] || [];
      if (!breedTypeSel.value) {
        resetBreedRight();
        return;
      }
      breedSel.disabled = false;
      breedSel.innerHTML = ['<option value="">請選擇</option>']
        .concat(list.map((b) => `<option value="${b}">${b}</option>`))
        .join("");
    }

    // 綁定事件
    speciesInputs.forEach((i) => i.addEventListener("change", syncBreedSelectors));
    breedTypeSel.addEventListener("change", () => {
      buildBreedOptions();
      updateBreedLabel();
    });
    syncBreedSelectors(); // 初始化一次

    // ===============================
    // 新增：圖片選取/預覽（最多 5 張）- 不卡頓版（縮圖/快取/手機拖曳排序）
    // ===============================
    const imgFiles = $("#imgFiles");
    const btnPick = $("#btnPick");
    const fileCount = $("#fileCount");
    const imgPreview = $("#imgPreview");

    // ===============================
    // 清除按鈕：清空表單 + 清空已選媒體 + 捲到建檔表單位置
    // ===============================
    const clearBtn = document.getElementById("clearBtn");
    const formSection = document.getElementById("formSection");

    function clearSelectedMedia() {
      try {
        // 釋放 objectURL（縮圖/影片）
        for (const f of selectedFiles) revokeThumb(f);
      } catch (_) { }
      selectedFiles = [];
      try { imgFiles.value = ""; } catch (_) { }

      // 清空預覽 DOM / 計數
      try { imgPreview.innerHTML = ""; } catch (_) { }
      try { fileCount.textContent = `已選 0 / ${MAX_FILES} 張`; } catch (_) { }

      // 清空 tile map（避免殘留）
      try { __previewTileMap.clear(); } catch (_) { }

      // 清空縮圖佇列（避免清除後還在跑縮圖）
      try { thumbJobQueue.length = 0; } catch (_) { }
    }

    function clearPetFormAndScroll() {
      const form = document.getElementById("petForm");
      if (form) form.reset();

      // 確保預設回到「貓」
      const catRadio = form?.querySelector('input[name="species"][value="貓"]');
      if (catRadio) catRadio.checked = true;

      // 清空文字欄位（保險）
      const nameInput = document.getElementById("name");
      if (nameInput) nameInput.value = "";
      const ageInput = document.getElementById("age");
      if (ageInput) ageInput.value = "";
      const genderSel = document.getElementById("gender");
      if (genderSel) genderSel.value = "";
      const descTa = document.getElementById("desc");
      if (descTa) descTa.value = "";
      const neutered = document.getElementById("neutered");
      if (neutered) neutered.checked = false;
      const vaccinated = document.getElementById("vaccinated");
      if (vaccinated) vaccinated.checked = false;

      // 清空「名字已存在」提示/紅框（若有）
      try { if (window.resetNameCheck) resetNameCheck(); } catch (_) { }

      // 重新同步品種下拉（會把右側下拉清回 disabled + 預設 label）
      try { syncBreedSelectors(); } catch (_) { }

      // 清空媒體
      clearSelectedMedia();

      // 捲到建檔表單位置
      (formSection || form)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    clearBtn?.addEventListener("click", clearPetFormAndScroll);

    const MAX_FILES = 5;
    const PREVIEW_MAX = 720;      // 預覽縮圖長邊上限（越小越順）
    const PREVIEW_QUALITY = 0.82; // JPEG 品質（0~1）

    let selectedFiles = []; // 待上傳檔案（順序 = 上傳順序）

    // File → 縮圖 objectURL（避免每次重畫都重新解碼）
    const thumbUrlCache = new Map();
    const thumbPromiseCache = new Map();

    // File(video) → objectURL（給 <video> 播放用；刪除時記得釋放）
    const videoObjUrlCache = new Map();
    function getVideoObjURL(file) {
      if (videoObjUrlCache.has(file)) return videoObjUrlCache.get(file);
      const u = URL.createObjectURL(file);
      videoObjUrlCache.set(file, u);
      return u;
    }
    function revokeVideoObjURL(file) {
      const u = videoObjUrlCache.get(file);
      if (u) {
        try { URL.revokeObjectURL(u); } catch (_) { }
        videoObjUrlCache.delete(file);
      }
    }
    // 同時跑 2 張縮圖（更快，但不會像全並發那麼容易卡）
    const THUMB_CONCURRENCY = 2;
    let thumbActive = 0;
    const thumbJobQueue = [];

    function runThumbQueue() {
      while (thumbActive < THUMB_CONCURRENCY && thumbJobQueue.length) {
        const job = thumbJobQueue.shift();
        thumbActive++;

        makeThumbURL(job.file)
          .then(job.resolve, job.reject)
          .finally(() => {
            thumbActive--;
            runThumbQueue();
          });
      }
    }

    const EMPTY_GIF = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";

    btnPick?.addEventListener("click", () => imgFiles.click());

    function revokeThumb(file) {
      const u = thumbUrlCache.get(file);
      if (u) {
        URL.revokeObjectURL(u);
        thumbUrlCache.delete(file);
      }
      thumbPromiseCache.delete(file);

      // 影片播放用的 objectURL 也一起釋放
      revokeVideoObjURL(file);
    }

    // 影片按鈕 icon（play / pause）
    const __PLAY_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>';
    const __PAUSE_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z"></path></svg>';

    async function __safePlayVideo(v) {
      try {
        await v.play();
        return;
      } catch (_) { }
      // iOS / 部分瀏覽器可能需要先靜音才允許播放（至少先讓預覽能播）
      try {
        v.muted = true;
        await v.play();
      } catch (e) {
        console.warn('video play failed:', e);
      }
    }

    async function decodeToBitmap(file) {
      const type = (file && file.type) || "";
      const isVideo = type.startsWith("video/");
      const isImage = type.startsWith("image/");
      // 影片：抓一張影格當縮圖（iOS 需要用 loadedmetadata \+ seek / RVFC 才容易出現畫面）
      if (isVideo) {
        const vUrl = URL.createObjectURL(file);
        try {
          const v = document.createElement("video");
          v.preload = "metadata";
          v.src = vUrl;
          v.muted = true;
          v.playsInline = true;
          v.setAttribute("playsinline", "");
          v.setAttribute("webkit-playsinline", "");
          v.disablePictureInPicture = true;

          // iOS Safari 有時不會觸發 loadeddata（不播放就不解碼畫面），所以用 loadedmetadata + seek 逼出第一張影格
          await new Promise((res, rej) => {
            v.onloadedmetadata = () => res();
            v.onerror = (e) => rej(e || new Error("載入影片失敗"));
          });

          // 目標抓取時間：盡量靠前，但不要是 0（iOS 有時 seek 到 0 會拿不到 frame）
          let t = 0.05;
          try {
            if (Number.isFinite(v.duration) && v.duration > 0.2) {
              t = Math.min(0.2, v.duration / 2);
              t = Math.max(0.05, Math.min(t, v.duration - 0.05));
            }
          } catch (_) { /* ignore */ }

          // 先嘗試 seek
          try {
            v.currentTime = t;
            await new Promise((res) => {
              const done = () => { v.removeEventListener("seeked", done); res(); };
              v.addEventListener("seeked", done);
            });
          } catch (_) {
            // 有些檔案/瀏覽器不給 seek，就用 0.01 退回
            try {
              v.currentTime = 0.01;
              await new Promise((res) => {
                const done = () => { v.removeEventListener("seeked", done); res(); };
                v.addEventListener("seeked", done);
              });
            } catch (_) { /* ignore */ }
          }

          // 等待畫面真正解碼（RVFC 最可靠）
          if (typeof v.requestVideoFrameCallback === "function") {
            await new Promise((res) => v.requestVideoFrameCallback(() => res()));
          } else {
            // readyState >= 2 才有 current frame data
            if (v.readyState < 2) {
              await Promise.race([
                new Promise((res) => { v.onloadeddata = () => res(); }),
                new Promise((res) => setTimeout(res, 150))
              ]);
            }
            await new Promise((res) => setTimeout(res, 30));
          }

          // iOS 有時仍然黑畫面：試著「靜音播放一下再暫停」逼出 frame
          try {
            await v.play();
            v.pause();
          } catch (_) { /* ignore */ }

          const w = v.videoWidth || 640;
          const h = v.videoHeight || 360;
          const c = document.createElement("canvas");
          c.width = w;
          c.height = h;
          const g = c.getContext("2d");
          g.drawImage(v, 0, 0, w, h);
          return c;
        } finally {
          URL.revokeObjectURL(vUrl);
        }
      }

      // 圖片：優先用 createImageBitmap（非阻塞解碼）
      if (window.createImageBitmap && isImage) {
        try { return await createImageBitmap(file); } catch (_) { /* fallback */ }
      }

      if (!isImage) {
        throw new Error("不支援的檔案類型");
      }

      // fallback：用 <img> 解碼（比較可能卡，但至少可用）
      const raw = URL.createObjectURL(file);
      try {
        const img = await new Promise((res, rej) => {
          const im = new Image();
          im.onload = () => res(im);
          im.onerror = rej;
          im.src = raw;
        });
        const c = document.createElement("canvas");
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        const g = c.getContext("2d");
        g.drawImage(img, 0, 0);
        return await createImageBitmap(c);
      } finally {
        URL.revokeObjectURL(raw);
      }
    }
    async function makeThumbURL(file) {
      const bmp = await decodeToBitmap(file);
      const W = bmp.width, H = bmp.height;
      const scale = Math.min(1, PREVIEW_MAX / Math.max(W, H));
      const w = Math.max(1, Math.round(W * scale));
      const h = Math.max(1, Math.round(H * scale));

      // 讓 UI 先喘口氣（避免「圖片顯示瞬間卡住」）
      await new Promise((r) => requestAnimationFrame(r));

      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      const g = c.getContext("2d", { alpha: false, desynchronized: true });
      g.drawImage(bmp, 0, 0, w, h);
      bmp.close?.();

      const blob = await new Promise((r) => c.toBlob(r, "image/jpeg", PREVIEW_QUALITY));
      return URL.createObjectURL(blob);
    }

    function ensureThumbURL(file) {
      if (thumbUrlCache.has(file)) return Promise.resolve(thumbUrlCache.get(file));
      if (thumbPromiseCache.has(file)) return thumbPromiseCache.get(file);

      const p = new Promise((resolve, reject) => {
        thumbJobQueue.push({ file, resolve, reject });
        runThumbQueue();
      })
        .then((url) => {
          thumbUrlCache.set(file, url);
          thumbPromiseCache.delete(file);
          return url;
        })
        .catch((err) => {
          thumbPromiseCache.delete(file);
          throw err;
        });

      thumbPromiseCache.set(file, p);
      return p;
    }

    const __previewTileMap = new Map(); // File -> tile element（保留 DOM，避免重畫閃爍）

    function __makePreviewTile(file) {
      const wrap = document.createElement("div");
      wrap.className = "relative touch-none select-none overflow-hidden";

      const type = (file && file.type) || "";

        v.disablePictureInPicture = true;
        v.src = getVideoObjURL(file);

        // ✅ 直接用影片本身抓一個 frame，避免黑畫面（特別是 iOS / Safari）
        __primeThumbVideoFrameAdmin(v);

        // 中央播放/暫停按鈕（取代原生控制列）
        const overlay = document.createElement("div");

        const syncBtn = () => {

          playBtn.setAttribute("aria-label", playing ? "暫停影片" : "播放影片");
        };

        v.addEventListener("play", syncBtn);
        v.addEventListener("pause", syncBtn);
        v.addEventListener("ended", () => {
          try { v.currentTime = 0; } catch (_) { }
          syncBtn();
        });

        playBtn.addEventListener("click", async (ev) => {

            await __safePlayVideo(v);
          } else {
            try { v.pause(); } catch (_) { }
          }
          syncBtn();

        overlay.appendChild(playBtn);

        // 先顯示空白，再異步塞縮圖，避免解碼瞬間卡頓
        ensureThumbURL(file)
          .then((url) => { img.src = url; })
          .catch(() => {
            // 真的不行就退回原圖（至少有預覽）
            try {
              const raw = URL.createObjectURL(file);
              img.src = raw;
              setTimeout(() => URL.revokeObjectURL(raw), 2000);
            } catch { }
          });

        wrap.appendChild(img);
        mediaEl = img;
      }

      const btn = document.createElement("button");
      // iOS Safari 會依「文字大小 / text-size-adjust」放大 rem，導致 Tailwind w-7/h-7 變大。
      // 這裡改用固定 px 尺寸 + SVG，確保手機/桌機一致。
      btn.className = "preview-remove-btn absolute top-1 right-1 z-20 bg-black/70 text-white rounded-full flex items-center justify-center";
      btn.type = "button";

          <path d="M18.3 5.7a1 1 0 0 0-1.4 0L12 10.6 7.1 5.7a1 1 0 1 0-1.4 1.4L10.6 12l-4.9 4.9a1 1 0 1 0 1.4 1.4L12 13.4l4.9 4.9a1 1 0 0 0 1.4-1.4L13.4 12l4.9-4.9a1 1 0 0 0 0-1.4z" fill="currentColor"/>
        </svg>
      `;
      btn.setAttribute("aria-label", "刪除這張");
      btn.dataset.remove = "1";

    }

    function __setPreviewIdx(tile, idx) {
      tile.dataset.idx = String(idx);
      const btn = tile.querySelector('button[data-remove]');

    function renderPreviews() {
      fileCount.textContent = `已選 ${selectedFiles.length} / ${MAX_FILES} 張`;

      // 不整個清空重畫：只搬動既有 DOM，避免「換順序閃一下」
      for (const [file, el] of __previewTileMap) {
        if (!selectedFiles.includes(file)) {
          el.remove();
          __previewTileMap.delete(file);
        }
      }

      selectedFiles.forEach((file, i) => {
        let tile = __previewTileMap.get(file);
        if (!tile) {
          tile = __makePreviewTile(file);
          __previewTileMap.set(file, tile);
        }
        __setPreviewIdx(tile, i);
        imgPreview.appendChild(tile); // appendChild 會把既有節點移動到正確位置
      });
    }

    // 刪除（事件代理）
    imgPreview.addEventListener("click", (e) => {
      const btn = e.target.closest?.("button[data-remove][data-idx]");
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      const i = +btn.dataset.idx;
      const f = selectedFiles[i];
      if (f) revokeThumb(f);
      selectedFiles.splice(i, 1);
      renderPreviews();
    });

    // 手機可用的拖曳交換（Pointer Events；放開時與目標交換）
    let dragFrom = null;
    let dragOver = null;
    let dragEl = null;

    function clearDragUI() {
      imgPreview.querySelectorAll("[data-idx]").forEach((el) => {
        el.classList.remove("ring-2", "ring-brand-500", "ring-brand-300", "opacity-80");
      });
    }

    imgPreview.addEventListener("pointerdown", (e) => {
      // 點到刪除鈕就不要進入拖曳
      if (e.target.closest?.("button")) return;

      const tile = e.target.closest?.("[data-idx]");
      if (!tile) return;

      dragEl = tile;
      dragFrom = +tile.dataset.idx;
      dragOver = dragFrom;

      tile.setPointerCapture?.(e.pointerId);
      clearDragUI();
      tile.classList.add("ring-2", "ring-brand-500", "opacity-80");

      // 避免觸控滾動搶走手勢
      e.preventDefault();
    });

    imgPreview.addEventListener("pointermove", (e) => {
      if (dragFrom == null) return;
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const tile = el?.closest?.("[data-idx]");
      if (!tile || !imgPreview.contains(tile)) return;

      const idx = +tile.dataset.idx;
      if (idx === dragOver) return;

      dragOver = idx;
      clearDragUI();
      if (dragEl) dragEl.classList.add("ring-2", "ring-brand-500", "opacity-80");
      tile.classList.add("ring-2", "ring-brand-300");
    });

    function finishDrag() {
      if (dragFrom == null) return;

      const from = dragFrom;
      const to = dragOver;

      clearDragUI();
      dragFrom = dragOver = null;
      dragEl = null;

      if (to == null || to === from) return;

      const tmp = selectedFiles[from];
      selectedFiles[from] = selectedFiles[to];
      selectedFiles[to] = tmp;

      renderPreviews();
    }

    imgPreview.addEventListener("pointerup", finishDrag);
    imgPreview.addEventListener("pointercancel", finishDrag);

    // 檔案挑選後：合併並截斷到 MAX_FILES 張
    imgFiles?.addEventListener("change", () => {
      const incoming = Array.from(imgFiles.files || []);
      const next = selectedFiles.concat(incoming);
      if (next.length > MAX_FILES) {
        Swal.fire({ icon: "warning", title: `最多 ${MAX_FILES} 張照片` });
      }
      selectedFiles = next.slice(0, MAX_FILES);
      renderPreviews();
      imgFiles.value = ""; // 清空 input，避免重複選取不到
    });

    // ===============================
    // 捲到最上方（保險版）
    // ===============================
    function forceScrollTop() {
      const root = document.documentElement;
      const prev = root.style.scrollBehavior;
      // 避免 smooth 在 DOM 重排 / focus restore 時被中斷卡在中途
      root.style.scrollBehavior = "auto";
      window.scrollTo(0, 0);
      root.scrollTop = 0;
      document.body.scrollTop = 0;

      requestAnimationFrame(() => {
        window.scrollTo(0, 0);
        root.scrollTop = 0;
        document.body.scrollTop = 0;
        root.style.scrollBehavior = prev || "";
      });

      // 再補一次，避免 SweetAlert / focus restore / DOM 重排造成回彈
      setTimeout(() => {
        window.scrollTo(0, 0);
        root.scrollTop = 0;
        document.body.scrollTop = 0;
      }, 80);
    }

    // ===============================
    // 表單送出：新增動物資料
    // ===============================
    $("#petForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      // 讀值

      const rawBreedType = breedTypeSel.value || "";
      const rawBreed = breedSel.value || "";
      let breed = "";
      if (!rawBreedType) {
        breed = "品種不詳";
      } else if (rawBreedType === "米克斯") {
        breed = rawBreed ? `米克斯/${rawBreed}` : "米克斯";
      } else {
        breed = rawBreed || "品種不詳";
      }

      const age = ($("#age")?.value || "").trim() || "年齡不詳";
      const gender = $("#gender")?.value || "性別不詳";
      const desc = ($("#desc")?.value || "").trim() || "無備註";

      // 新增的基本 payload（圖片先空陣列，稍後補）
      const payload = {
        species: getSpecies(),
        name,
        nameLower: name.toLowerCase(),
        breedType: rawBreedType,
        breed,
        age,
        gender,
        desc,
        neutered: document.getElementById('neutered')?.checked || false,
        vaccinated: document.getElementById('vaccinated')?.checked || false,
        images: [],
        status: "available",
        showOnHome: false,
        showOnCats: true,
        showOnDogs: true,
        showOnIndex: true,
        createdAt: serverTimestamp(), // Firestore 伺服器時間
      };

      // 先檢查是否有同名（可選擇仍然新增）
      if (name !== "未取名") {
        try {
          const dupQ = query(collection(db, "pets"), where("name", "==", name));
          const dupSnap = await getDocs(dupQ);
          if (!dupSnap.empty) {
            const r = await Swal.fire({
              icon: "question",
              title: `名字「${name}」已存在`,
              text: "確定繼續建檔？",
              showCancelButton: true,
              confirmButtonText: "確定",
              cancelButtonText: "取消",
              returnFocus: false, // 避免關閉後把焦點還給 input 而導致捲動回彈
            });
            if (!r.isConfirmed) {
              document.getElementById("namelabel")?.scrollIntoView({ behavior: "smooth", block: "start" });
              return;
            }
          }
        } catch (err) {
          console.error("重複檢查錯誤：", err);
        }
      }

      // 按鈕進度狀態
      const submitBtn = $("#submitBtn");
      submitBtn.disabled = true;
      const prog = startProgressBar(submitBtn, { imgSrc: "images/奔跑貓咪.png" });
      prog.update(0);

      try {
        // 1) 新增基本文件
        const docRef = await addDoc(collection(db, "pets"), payload);

        // 2) 逐張上傳圖片，取得 Storage URL
        const urls = [];

        const __progressTotalBytes = selectedFiles.reduce((s, f) => s + (f?.size || 0), 0) || 1;
        let __progressUploadedBytes = 0;

        for (const f of selectedFiles) {
          const origType = (f && f.type) || "";
          const isVid = origType.startsWith("video/");
          let blobToUpload = f;
          let type = origType;
          let ext = "bin";

          // 圖片：仍在前端加浮水印
          if (!isVid) {
            blobToUpload = await addWatermarkToFile(f);       // ← 圖片才加浮水印
            type = blobToUpload.type || "";
            if (type.startsWith("image/")) {
              ext = type === "image/png" ? "png" : "jpg";
            } else {
              // fallback
              ext = (f.name && f.name.split(".").pop()) || "bin";
            }
          } else {
            // 影片：直接上傳原檔（不在前端轉檔/浮水印）
            const byName = (f.name && f.name.split(".").pop()) || "";
            if (byName) ext = byName.toLowerCase();
            else if (type.includes("webm")) ext = "webm";
            else if (type.includes("ogg")) ext = "ogg";
            else if (type.includes("mp4") || type.includes("mpeg")) ext = "mp4";
            else if (type.includes("quicktime")) ext = "mov";
            else ext = "mp4";
          }

          const base = (f.name || "file").replace(/\.[^.]+$/, "");
          const prefix = isVid ? "upload" : "pets";
          const path = `${prefix}/${docRef.id}/${Date.now()}_${base}.${ext}`;
          const r = sRef(storage, path);

          await new Promise((resolve, reject) => {
            const task = uploadBytesResumable(r, blobToUpload, { contentType: type || "application/octet-stream" });
            task.on("state_changed",
              (snap) => {
                const base = __progressUploadedBytes || 0;
                const now = base + (snap?.bytesTransferred || 0);
                const pct = (__progressTotalBytes > 0) ? (now / __progressTotalBytes) * 100 : 0;
                prog.update(pct);
              },
              (err) => reject(err),
              () => {
                __progressUploadedBytes = (__progressUploadedBytes || 0) + (task.snapshot?.totalBytes || blobToUpload?.size || 0);
                prog.update((__progressTotalBytes > 0) ? (__progressUploadedBytes / __progressTotalBytes) * 100 : 100);
                resolve();
              }
            );
          });

          urls.push(await getDownloadURL(r));
        }

        // 3) 回寫 images 欄位
        if (urls.length) {
          await updateDoc(doc(db, "pets", docRef.id), { images: urls });
        }

        // UI 收尾
        prog.update(100);
        prog.stop({ text: "處理中...", keepDisabled: true });
        submitBtn.disabled = true;
        submitBtn.textContent = "處理中...";

        // ★ 清空名字欄位 + 把「已被使用」提示/紅框移除
        const nameInput = document.getElementById("name");
        if (nameInput) nameInput.value = "";
        if (window.resetNameCheck) resetNameCheck();

        // 重置表單與選擇圖片（先做，避免 DOM 還在變動導致 smooth scroll 卡住）
        e.target.reset();
        imgPreview.innerHTML = "";
        selectedFiles = [];
        fileCount.textContent = "已選 0 / 5 張";
        syncBreedSelectors();

        // 先啟動重新載入列表（避免等到提示結束才開始抓資料）
        const reloadPromise = loadPets();

        // ★ 建檔完成 → 捲到最上方（先 smooth，最後再硬捲補正）
        window.scrollTo({ top: 0, behavior: "smooth" });
        setTimeout(forceScrollTop, 250); // smooth 途中若被打斷，250ms 後硬捲補正

        // 成功提示後直接打開詳情
        await Swal.fire({
          icon: "success",
          title: "已建檔！",
          showConfirmButton: false,
          timer: 1500,
          returnFocus: false, // 避免關閉後把焦點還給原 input 而導致捲動回彈
        });
        try {
          await reloadPromise;
        } catch (e) {
          console.error("loadPets error:", e);
        }
        forceScrollTop(); // ✅ 保證捲到最上面（不會卡在一半）
        openDialog(docRef.id);
      } catch (err) {
        await Swal.fire({ icon: "error", title: "建檔失敗", text: err.message });
      } finally {
        // 收回進度條並恢復排版
        try { prog.stop({ restore: true, text: "建檔", keepDisabled: false }); } catch (_) { }
        submitBtn.disabled = false;
        submitBtn.textContent = "建檔";
      }
    });

    // ===============================
    // 列表載入 + 搜尋 + 渲染（桌機/手機）
    // ===============================
    async function loadPets() {
      const q = query(collection(db, "pets"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      pets.length = 0;
      pets.push(...snap.docs.map((d) => ({ id: d.id, ...d.data() })));
      applyFilterAndRender();
    }

    const searchInput = $("#searchName");
    searchInput.addEventListener("input", onSearchByName);

    // ===== Pagination (1頁10筆) =====
    const PAGE_SIZE = 10;
    let currentPage = 1;
    let viewList = [];

    function setViewList(list, resetPage = true) {
      viewList = Array.isArray(list) ? list : [];
      if (resetPage) currentPage = 1;
      renderCurrentPage();
    }

    function renderCurrentPage() {
      const totalItems = viewList.length;
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));

      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageList = viewList.slice(start, start + PAGE_SIZE);

      renderStable(() => {
        renderRows(pageList);
        renderRowsMobile(pageList);
      });

      updatePager(totalItems, totalPages);
    }

    function updatePager(totalItems, totalPages) {
      const wrap = document.getElementById("pagerWrap");
      const info = document.getElementById("pageInfo");
      const pager = document.getElementById("pager");
      if (!wrap || !info || !pager) return;

      if (totalItems === 0) {
        wrap.classList.add("hidden");
        return;
      }
      wrap.classList.remove("hidden");

      info.textContent = `第 ${currentPage}/${totalPages} 頁（共 ${totalItems} 筆）`;

      pager.innerHTML = "";
      const makeBtn = (label, targetPage, disabled = false, active = false) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "pager-btn" + (active ? " active" : "");
        b.textContent = label;
        b.disabled = disabled;
        if (!disabled) {
          b.addEventListener("click", () => {
            currentPage = targetPage;
            renderCurrentPage();
            document.getElementById("listSection")?.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        }
        return b;
      };

      pager.appendChild(makeBtn("«", 1, currentPage === 1));
      pager.appendChild(makeBtn("‹", Math.max(1, currentPage - 1), currentPage === 1));

      const maxNums = 5;
      let start = Math.max(1, currentPage - Math.floor(maxNums / 2));
      let end = Math.min(totalPages, start + maxNums - 1);
      start = Math.max(1, end - maxNums + 1);

      for (let p = start; p <= end; p++) {
        pager.appendChild(makeBtn(String(p), p, false, p === currentPage));
      }

      pager.appendChild(makeBtn("›", Math.min(totalPages, currentPage + 1), currentPage === totalPages));
      pager.appendChild(makeBtn("»", totalPages, currentPage === totalPages));
    }

    function applyFilterAndRender() {
      const kw = searchInput.value.trim().toLowerCase();
      const list = kw
        ? pets.filter((p) => String(p.name || "").toLowerCase().includes(kw))
        : pets;
      setViewList(list, true);
    }

    // 後端依名字（前綴）查詢：有關鍵字→打 Firestore；空字串→回到預設清單
    async function onSearchByName() {
      const kwRaw = searchInput.value.trim();
      const kw = kwRaw.toLowerCase();
      if (!kw) {
        applyFilterAndRender();
        return;
      }

      try {
        // Phase 1：前綴（加速）
        let prefix = [];
        try {
          const qPrefix = query(
            collection(db, "pets"),
            orderBy("nameLower"),
            where("nameLower", ">=", kw),
            where("nameLower", "<=", kw + "\uf8ff"),
            fbLimit(100)
          );
          const snapPrefix = await getDocs(qPrefix);
          prefix = snapPrefix.docs.map(d => ({ id: d.id, ...d.data() }));
        } catch (e) {
          console.warn("prefix search skipped:", e);
        }

        // Phase 2：最近 N 筆做「任意位置包含」
        let recentDocs = [];
        try {
          const snapRecent = await getDocs(query(
            collection(db, "pets"),
            orderBy("createdAt", "desc"),
            fbLimit(1200)
          ));
          recentDocs = snapRecent.docs;
        } catch (e) {
          // 若沒有 createdAt 可排序，退回 nameLower 排序拿一批
          const snapRecent = await getDocs(query(
            collection(db, "pets"),
            orderBy("nameLower"),
            fbLimit(1200)
          ));
          recentDocs = snapRecent.docs;
        }

        const contains = recentDocs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(p => {
            const nm = String(p.name || "");
            const nmLower = String(p.nameLower || nm).toLowerCase();
            return nmLower.includes(kw) || nm.includes(kwRaw);
          });

        // 合併 + 去重（新者優先）
        const byId = new Map();
        [...contains, ...prefix].forEach(p => byId.set(p.id, p));
        const list = Array.from(byId.values()).sort((a, b) => {
          const ta = (a.createdAt && a.createdAt.seconds) ? a.createdAt.seconds : 0;
          const tb = (b.createdAt && b.createdAt.seconds) ? b.createdAt.seconds : 0;
          return tb - ta;
        });

        setViewList(list, true);
      } catch (err) {
        console.error("search error", err);
        // 後備：用目前記憶中的清單做包含搜尋
        const list = pets.filter(p => String(p.name || "").toLowerCase().includes(kw));
        setViewList(list, true);
      }
    }

    // 桌機表格
    function renderRows(list) {
      const tb = document.getElementById("rows");
      if (!tb) return;

      tb.innerHTML = list
        .map(
          (p) => `
      <tr class="border-t hover:bg-gray-50 cursor-pointer" data-id="${p.id}">
        <td class="py-2 pr-2 font-medium">${p.name}</td>
        <td class="py-2 pr-2">${p.species}</td>
        <td class="py-2 pr-2">${p.breed}</td>
        <td class="py-2 pr-2">${p.gender}</td>
      </tr>`
        )
        .join("");

      tb.querySelectorAll("tr").forEach((tr) =>
        tr.addEventListener("click", () => {
          const data = list.find((p) => p.id === tr.dataset.id);
          if (data) openDialog(data.id);
        })
      );
    }

    // 強制靜音鎖（避免 iOS/Safari 在 play() 瞬間仍短暫出聲）
    function __forceMute(v) {
      if (!v) return;
      v.muted = true;
      v.defaultMuted = true;          // iOS 很重要
      v.volume = 0;                   // 雙保險：有些情況 muted 不吃但 volume=0 會吃
      v.setAttribute("muted", "");
      v.playsInline = true;
      v.setAttribute("playsinline", "");
      v.setAttribute("webkit-playsinline", "");
      v.disablePictureInPicture = true;

      if (!v.__muteLocked) {
        v.__muteLocked = true;
        v.addEventListener("volumechange", () => {
          if (!v.muted || v.volume !== 0) {
            v.muted = true;
            v.defaultMuted = true;
            v.volume = 0;
            v.setAttribute("muted", "");
          }
        });
      }
    }

    // 影片縮圖：抓第一幀（不走 canvas，避免 CORS）
    const __THUMB_PLAY_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>';

    function __primeThumbVideoFrameAdmin(v) {
      if (!v || v.dataset.__primed === "1") return;
      v.dataset.__primed = "1";

      __forceMute(v);

      const seekToThumbTime = () => {
        try {
          const dur = Number.isFinite(v.duration) ? v.duration : 0;
          let t = 0.05;
          if (dur && dur > 0.2) {
            t = Math.min(0.2, dur / 2);
            t = Math.max(0.05, Math.min(t, dur - 0.05));
          }
          v.currentTime = t;
        } catch (_) { }
      };

      const ensurePaint = () => {
        if (v.dataset.__painted === "1") return;
        v.dataset.__painted = "1";

        try {
          __forceMute(v);
          const p = v.play();
          if (p && typeof p.then === "function") {
            p.then(() => {
              if (typeof v.requestVideoFrameCallback === "function") {
                v.requestVideoFrameCallback(() => {
                  try { v.pause(); } catch (_) { }
                });
              } else {
                setTimeout(() => {
                  try { v.pause(); } catch (_) { }
                }, 60);
              }
            }).catch(() => {
              try { v.pause(); } catch (_) { }
            });
          }
        } catch (_) {
          try { v.pause(); } catch (_) { }
        }
      };

      v.addEventListener("loadedmetadata", () => {
        seekToThumbTime();
        ensurePaint();
      }, { once: true });

      v.addEventListener("seeked", () => {
        ensurePaint();
      }, { once: true });

      setTimeout(() => {
        try {
          if (v.readyState < 2) return;
          if (v.currentTime === 0) seekToThumbTime();
          ensurePaint();
        } catch (_) { }
      }, 200);
    }

    // downloadUrl → Storage path（用於 thumbByPath）
    function storagePathFromDownloadUrl(url) {
      try {
        const p = String(url || "").split("/o/")[1].split("?")[0];
        return decodeURIComponent(p);
      } catch (_) {
        return "";
      }
    }

    // 手機卡片
    function renderRowsMobile(list) {
      const wrap = document.getElementById("rowsMobile");
      if (!wrap) return;

      wrap.innerHTML = list
        .map((p) => {
          const mediaUrl = (Array.isArray(p.images) && p.images[0]) || p.image || "";
          const isVid = typeof isVideoUrl === "function" && isVideoUrl(mediaUrl);
          const videoPath = isVid ? storagePathFromDownloadUrl(mediaUrl) : "";
          const videoThumb = (isVid && p.thumbByPath && videoPath) ? (p.thumbByPath[videoPath] || "") : "";

          const thumb = isVid
            ? (videoThumb
              ? `
               <div class="media-thumb">
                 <img src="${videoThumb}" alt="" loading="lazy" decoding="async">
                 <div class="video-badge"><div class="video-badge-inner">${__THUMB_PLAY_SVG}</div></div>
               </div>
              `
              : `
               <div class="media-thumb">
                 <video class="thumb-video" preload="metadata" muted playsinline webkit-playsinline disablepictureinpicture src="${mediaUrl}"></video>
                 <div class="video-badge"><div class="video-badge-inner">${__THUMB_PLAY_SVG}</div></div>
               </div>
              `)
            : `
               <div class="media-thumb">
                 <img src="${mediaUrl}" alt="" loading="lazy" decoding="async">
               </div>
              `;

          return `
        <div class="rounded-xl ring-1 ring-gray-200 p-3 flex gap-3 items-center cursor-pointer"
             data-id="${p.id}">
          ${thumb}
          <div class="min-w-0 flex-1">
            <div class="font-semibold truncate">${p.name}</div>
            <div class="text-xs text-gray-600 mt-1 truncate">
              ${p.species}・${p.breed}・${p.gender}
            </div>
          </div>
        </div>`;
        })
        .join("");

      // 影片縮圖：seek 到前面一點，顯示第一幀
      wrap.querySelectorAll("video.thumb-video").forEach((v) => {
        __primeThumbVideoFrameAdmin(v);
      });

      wrap.querySelectorAll("[data-id]").forEach((card) =>
        card.addEventListener("click", () => {
          const data = list.find((p) => p.id === card.dataset.id);
          if (data) openDialog(data.id);
        })
      );
    }

    // === 名字輸入：即時重複檢查（建立時用） ===
    (() => {
      const input = document.getElementById("name");
      if (!input) return;

      // 建一個提示元素（顯示 檢查中 / 可用 / 已被使用）
      let hint = document.getElementById("nameHint");
      if (!hint) {
        hint = document.createElement("div");
        hint.id = "nameHint";
        hint.setAttribute("aria-live", "polite");
        // 直接用內聯樣式，避免 Tailwind purge
        hint.style.minHeight = "20px";   // 預留 1 行高度
        hint.style.lineHeight = "20px";  // 讓文字置中該行
        hint.style.whiteSpace = "nowrap";
        hint.style.marginTop = "4px";
        hint.style.fontSize = "0.875rem"; // 約等於 text-sm
        hint.style.color = "#6b7280";     // 約等於 text-gray-500
        // 放在名字輸入框的正後方
        document.getElementById("name").insertAdjacentElement("afterend", hint);
      }

      // 簡單防抖，避免每個字都打 API
      const debounce = (fn, d = 350) => {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), d); };
      };

      // 避免回應亂序：只處理最後一次查詢
      let lastVer = 0;
      const setState = (status, text) => {
        // 邊框：只有 bad 用紅框，其餘恢復原樣
        if (!input.dataset._origClass) input.dataset._origClass = input.className;
        if (status === "bad") {
          input.className = `${input.dataset._origClass} border-red-500 focus:outline-none`;
        } else {
          input.className = input.dataset._origClass;
        }

        // 提示：只有 bad 顯示文字，其餘清空
        hint.textContent = (status === "bad") ? (text || "") : "";

        // 顏色：只有 bad 顯示紅色
        hint.style.color = (status === "bad") ? "#dc2626" /* red-600 */ : "#6b7280" /* gray-500 */;
      };

      const runCheck = debounce(async () => {
        const ver = ++lastVer;
        const name = (input.value || "").trim();
        if (!name) { setState("idle", ""); return; }

        hint.textContent = "";

        const kw = name.toLowerCase();

        try {
          // 先用 nameLower 精準比對（你已在新增/編輯會寫入 nameLower）
          const q1 = query(
            collection(db, "pets"),
            where("nameLower", "==", kw),
            fbLimit(1)
          );
          const s1 = await getDocs(q1);
          if (ver !== lastVer) return; // 只處理最新一次

          // 若舊資料沒 nameLower，補做一次 name 精準比對（較慢，但只查 1 筆）
          let duplicated = !s1.empty;
          if (!duplicated) {
            const q2 = query(
              collection(db, "pets"),
              where("name", "==", name),
              fbLimit(1)
            );
            const s2 = await getDocs(q2);
            duplicated = !s2.empty;
            if (ver !== lastVer) return;
          }

          if (duplicated) {
            setState("bad", `「${name}」已被使用`);
          } else {
            setState("idle", ""); // 不顯示「可以使用」
          }
        } catch (e) {
          // 失敗時不要卡紅框，只顯示訊息
          setState("idle", "檢查失敗，稍後再試");
          console.error("name check error:", e);
        } finally {
          input.removeAttribute("aria-busy");
        }
      }, 100);

      input.addEventListener("input", runCheck);

      // 讓外部可在「建檔成功」後重置提示與樣式
      window.resetNameCheck = () => {
        // 把最新檢查版本往前推，避免舊請求回來覆蓋
        lastVer++;
        // 清除提示與紅框
        setState("idle", "");
        input.removeAttribute("aria-busy");
      };
    })();

    window.loadPets = loadPets;
    loadPets();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/Modal.js"></script>
  <script src="assets/Lightbox.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        const reg = await navigator.serviceWorker.register("./sw.js");

        // 每次載入可檢查更新（不會自動刷新）
        reg.update(); // 你原本就有 :contentReference[oaicite:7]{index=7}

        // 只在「真的有更新」時才提示
        let updatePromptShown = false;

        async function promptUpdate() {
          if (updatePromptShown) return;
          updatePromptShown = true;

          const result = await Swal.fire({
            title: "有新版本可用",
            text: "是否現在更新？（會重新整理頁面）",
            icon: "info",
            showCancelButton: true,
            confirmButtonText: "更新",
            cancelButtonText: "稍後",
          });

          if (result.isConfirmed) {
            // 叫 waiting 的新版 SW 立刻上線
            if (reg.waiting) {
              reg.waiting.postMessage({ type: "SKIP_WAITING" });
            }
          }
        }

        // 若已經有 waiting（例如使用者開著頁面很久後，SW 下載好了）
        if (reg.waiting && navigator.serviceWorker.controller) {
          // controller 存在表示不是第一次安裝，而是「更新」
          promptUpdate();
        }

        // 偵測到新 SW 安裝完成時
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          if (!nw) return;

          nw.addEventListener("statechange", () => {
            // installed + 有 controller => 代表「更新」（不是第一次安裝）
            if (nw.state === "installed" && navigator.serviceWorker.controller) {
              promptUpdate();
            }
          });
        });

        // ✅ 只有在使用者按了「更新」導致 skipWaiting 生效後，才刷新一次
        let reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        });
      });
    }
  </script>
